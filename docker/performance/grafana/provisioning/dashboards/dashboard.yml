# =============================================================================
# GRAFANA DASHBOARD PROVISIONING
# =============================================================================

apiVersion: 1

providers:
  - name: 'NeuroSense FX Dashboards'
    orgId: 1
    folder: 'NeuroSense FX'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: true
